################################################################################
# @file .github/workflows/build_and_test.yml
# @brief GitHub Actions CI/CD pipeline for OS kernel
#
# Automatically builds and tests the kernel on every push and pull request.
#
# Jobs:
#   1. build - Compile kernel for x86_64
#   2. test-unit - Run unit tests
#   3. test-integration - Run integration tests with QEMU
#
# Triggers:
#   - Every push to any branch
#   - Every pull request
#   - Manual trigger via GitHub UI
#
# Requirements:
#   - nasm (assembler)
#   - GCC cross-compiler (x86_64-elf-gcc)
#   - QEMU (qemu-system-x86_64)
#   - xorriso (ISO creation)
#   - Make
################################################################################

name: Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  # Compiler flags for optimization
  CFLAGS: "-Wall -Wextra -Werror -O2"

  # Build artifact retention
  ARTIFACT_RETENTION: 5

################################################################################
# JOBS
################################################################################

jobs:
  # ===========================================================================
  # JOB: Build Kernel
  # ===========================================================================
  build:
    name: Build x86_64 Kernel
    runs-on: ubuntu-latest

    steps:
      # =====================================================================
      # Checkout source code
      # =====================================================================
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Full history for better analysis

      # =====================================================================
      # Set up build environment
      # =====================================================================
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            nasm \
            xorriso \
            grub-common \
            gcc-x86-64-linux-gnu \
            binutils-x86-64-linux-gnu

      # =====================================================================
      # Cache build artifacts (optional but speeds up CI)
      # =====================================================================
      - name: Cache build artifacts
        uses: actions/cache@v3
        with:
          path: dist/
          key: ${{ runner.os }}-build-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-build-

      # =====================================================================
      # Build the kernel
      # =====================================================================
      - name: Build kernel
        run: |
          echo "Building 64-bit OS kernel..."
          make build-x86_64

          # Verify build output
          if [ ! -f dist/x86_64/kernel.iso ]; then
            echo "ERROR: Kernel ISO not created!"
            exit 1
          fi

          # Show build artifact size
          ls -lh dist/x86_64/kernel.iso

      # =====================================================================
      # Upload build artifacts
      # =====================================================================
      - name: Upload kernel image
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: kernel-image-${{ github.sha }}
          path: dist/x86_64/kernel.iso
          retention-days: ${{ env.ARTIFACT_RETENTION }}

      # =====================================================================
      # Upload build logs
      # =====================================================================
      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: build-logs-${{ github.sha }}
          path: |
            build-output.txt
            *.log
          retention-days: 1

  # ===========================================================================
  # JOB: Unit Tests
  # ===========================================================================
  test-unit:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc

      # =====================================================================
      # Download build artifacts
      # =====================================================================
      - name: Download kernel image
        uses: actions/download-artifact@v3
        with:
          name: kernel-image-${{ github.sha }}
          path: dist/x86_64/

      # =====================================================================
      # Compile and run unit tests
      # =====================================================================
      - name: Build unit tests
        run: |
          echo "Building unit tests..."
          cd tests/
          gcc -o test_print \
            ../test_framework.c \
            test_print.c \
            -I.. \
            -Wall -Wextra

          # Verify test executable created
          if [ ! -f test_print ]; then
            echo "ERROR: Unit test executable not created!"
            exit 1
          fi

      - name: Run unit tests
        run: |
          echo "Running unit tests..."
          cd tests/
          ./test_print
          TEST_RESULT=$?

          if [ $TEST_RESULT -ne 0 ]; then
            echo "Unit tests failed with exit code $TEST_RESULT"
            exit $TEST_RESULT
          fi

      # =====================================================================
      # Upload test results
      # =====================================================================
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: unit-test-results-${{ github.sha }}
          path: tests/test-results.txt
          retention-days: 30

  # ===========================================================================
  # JOB: Integration Tests
  # ===========================================================================
  test-integration:
    name: Integration Tests (QEMU)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            nasm \
            xorriso \
            grub-common \
            qemu-system-x86 \
            gcc-x86-64-linux-gnu \
            binutils-x86-64-linux-gnu

      # =====================================================================
      # Download build artifacts
      # =====================================================================
      - name: Download kernel image
        uses: actions/download-artifact@v3
        with:
          name: kernel-image-${{ github.sha }}
          path: dist/x86_64/

      # =====================================================================
      # Make test script executable
      # =====================================================================
      - name: Prepare test environment
        run: |
          chmod +x scripts/integration_test.sh
          ls -lh dist/x86_64/kernel.iso

      # =====================================================================
      # Run integration tests
      # =====================================================================
      - name: Run integration tests
        run: |
          echo "Running integration tests..."
          ./scripts/integration_test.sh --verbose
          TEST_RESULT=$?

          if [ $TEST_RESULT -ne 0 ]; then
            echo "Integration tests failed with exit code $TEST_RESULT"
            exit $TEST_RESULT
          fi

      # =====================================================================
      # Upload test output
      # =====================================================================
      - name: Upload QEMU output
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: qemu-output-${{ github.sha }}
          path: /tmp/qemu_output.txt
          retention-days: 30

  # ===========================================================================
  # JOB: Code Quality (optional but recommended)
  # ===========================================================================
  quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format clang-tidy

      # =====================================================================
      # Code formatting check
      # =====================================================================
      - name: Check code formatting
        run: |
          echo "Checking code formatting with clang-format..."
          find src/ -name "*.c" -o -name "*.h" | while read file; do
            clang-format --dry-run --Werror "$file"
          done
        continue-on-error: true

      # =====================================================================
      # Static analysis
      # =====================================================================
      - name: Run static analysis
        run: |
          echo "Running static analysis with clang-tidy..."
          find src/ -name "*.c" | while read file; do
            clang-tidy "$file" -- -I. || true
          done
        continue-on-error: true

